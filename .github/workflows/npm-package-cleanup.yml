name: NPM Package Cleanup

on:
  workflow_dispatch:
    inputs:
      otp:
        description: One-time password for npm write operations when TFA is required
        required: false
        type: string

jobs:
  remove-unscoped-package:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Remove accidentally unscoped package
        run: |
          if npm view koppajs-language-core version >/dev/null 2>&1; then
            if [ -n "${NPM_OTP}" ]; then
              npm unpublish koppajs-language-core --force --otp "${NPM_OTP}"
              echo "Unscoped package removed with OTP."
            elif npm unpublish koppajs-language-core --force; then
              echo "Unscoped package removed."
            else
              npm deprecate "koppajs-language-core@*" "Accidentally published without the required @koppajs scope. Install @koppajs/koppajs-language-core instead."
              echo "Unpublish was blocked by npm policy; package was deprecated instead."
            fi
          else
            echo "Unscoped package does not exist."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_OTP: ${{ inputs.otp }}
